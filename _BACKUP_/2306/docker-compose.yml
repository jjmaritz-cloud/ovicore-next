services:
  postgres:
    image: postgres:16
    container_name: ovicore_broiler_postgres
    environment:
      POSTGRES_USER: ovicore
      POSTGRES_PASSWORD: ovicore
      POSTGRES_DB: ovicore
    ports:
      - "5432:5432"
    volumes:
      - ovicore_broiler_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovicore -d ovicore"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ovicore_broiler_pgdata:
